spring.application.name=delivery-service

server.port=8086

spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_db
spring.datasource.username=ryomen07
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=delivery-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.listener.ack-mode=record
spring.kafka.consumer.enable-auto-commit=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Auth service (authoritative source for delivery-partner identity/profile)
services.auth.url=http://localhost:8081