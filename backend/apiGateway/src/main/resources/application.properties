spring.application.name=api-gateway

server.port=8080

# Provide the real secret via the JWT_SECRET env var (must match the auth service).
# The default below is an insecure local-dev placeholder — do NOT use in production.
jwt.secret=${JWT_SECRET:local-dev-only-insecure-jwt-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=health,info,gateway

logging.level.org.springframework.cloud.gateway=DEBUG