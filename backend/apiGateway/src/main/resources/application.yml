spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      server:
        webflux:
          routes:

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**,/test/**

            - id: restaurant-service
              uri: http://localhost:8083
              predicates:
                - Path=/restaurants/**,/categories/**,/menu-items/**

            - id: order-service
              uri: http://localhost:8084
              predicates:
                - Path=/orders/**

            - id: payment-service
              uri: http://localhost:8085
              predicates:
                - Path=/payments/**

            - id: delivery-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/delivery/**,/deliveries/**,/delivery-partners/**

            - id: tracking-service
              uri: http://localhost:8087
              predicates:
                - Path=/tracking/**,/ws/tracking/**