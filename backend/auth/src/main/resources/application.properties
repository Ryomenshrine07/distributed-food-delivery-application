# ==========================================================
# APPLICATION
# ==========================================================

spring.application.name=auth-service
server.port=8081
logging.level.org.springframework.security=TRACE

# ==========================================================
# POSTGRESQL DATABASE
# ==========================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/food_delivery_auth
spring.datasource.username=ryomen07
spring.datasource.password=your_postgres_password
spring.datasource.driver-class-name=org.postgresql.Driver


# ==========================================================
# JPA / HIBERNATE
# ==========================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ==========================================================
# JWT
# ==========================================================

# Provide the real secret via the JWT_SECRET env var (must match the api-gateway).
# The default below is an insecure local-dev placeholder — do NOT use in production.
jwt.secret=${JWT_SECRET:local-dev-only-insecure-jwt-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}


# ==========================================================
# LOGGING
# ==========================================================

logging.level.root=INFO
logging.level.com.service.auth=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# ==========================================================
# JACKSON
# ==========================================================

spring.jackson.serialization.write-dates-as-timestamps=false


# ==========================================================
# ACTUATOR (ENABLE LATER)
# ==========================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# ==========================================================
# REDIS
# ==========================================================

spring.data.redis.host=localhost
spring.data.redis.port=6379


# =========================
# Kafka
# =========================

spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# We are using our own event classes in different services
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Reliability
spring.kafka.producer.acks=all
spring.kafka.producer.retries=2147483647
spring.kafka.producer.enable-idempotence=true