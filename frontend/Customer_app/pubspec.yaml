name: customer_app
description: Customer-facing mobile application for the Food Delivery Platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  decimal: ^3.2.1
  jwt_decoder: ^2.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  google_maps_flutter: ^2.17.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_polyline_points: ^2.1.0
  stomp_dart_client: ^2.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  http_mock_adapter: any

flutter:
  uses-material-design: true
